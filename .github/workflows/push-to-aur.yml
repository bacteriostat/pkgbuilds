name: Push packages to AUR

on:
  push:
    branches:
      - master
    paths:
      - '*/PKGBUILD'
      - '!archive/**'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup AUR SSH
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          printf 'Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n' >> ~/.ssh/config

      - name: Push changed packages to AUR
        env:
          AUR_USER_NAME: ${{ secrets.AUR_USER_NAME }}
          AUR_USER_EMAIL: ${{ secrets.AUR_USER_EMAIL }}
        run: python3 .github/scripts/push_to_aur.py
