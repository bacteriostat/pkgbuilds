name: Check all packages for upstream updates

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.read.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse packages config
        id: read
        run: |
          PACKAGES=$(python3 -c "
          import yaml, json
          with open('.github/packages.yml') as f:
              config = yaml.safe_load(f)
          pkgs = [p for p in config['packages'] if p.get('check_type') in ('github', 'gitlab', 'xmind_custom')]
          for p in pkgs:
              if 'tag_pattern' not in p:
                  p['tag_pattern'] = 's/^v//'
              if 'release_type' not in p:
                  p['release_type'] = 'latest'
              if 'pkgver_var' not in p:
                  p['pkgver_var'] = 'pkgver'
          print(json.dumps(pkgs))
          ")
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

  check:
    needs: load-config
    if: needs.load-config.outputs.packages != '[]'
    strategy:
      matrix:
        package: ${{ fromJSON(needs.load-config.outputs.packages) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest upstream version
        id: upstream
        env:
          UPSTREAM_REPO: ${{ matrix.package.upstream }}
          TAG_PATTERN: ${{ matrix.package.tag_pattern }}
          RELEASE_TYPE: ${{ matrix.package.release_type }}
          CHECK_TYPE: ${{ matrix.package.check_type }}
          REDIRECT_URL: ${{ matrix.package.url }}
          FILENAME_PREFIX: ${{ matrix.package.filename_prefix }}
        run: |
          if [[ "${CHECK_TYPE}" == "xmind_custom" ]]; then
            DEST=$(curl -sSf -o /dev/null -w '%{redirect_url}' "${REDIRECT_URL}")
            if [[ -z "$DEST" ]]; then
              echo "ERROR: No redirect from ${REDIRECT_URL}" >&2
              exit 1
            fi
            FILENAME=$(basename "$DEST" .deb)
            VERSION="${FILENAME#${FILENAME_PREFIX}}"
          elif [[ "${CHECK_TYPE}" == "gitlab" ]]; then
            ENCODED_REPO="${UPSTREAM_REPO/\//%2F}"
            TAG=$(curl -s \
              "https://gitlab.com/api/v4/projects/${ENCODED_REPO}/repository/tags?per_page=1" \
              | grep -oP '"name":"\K[^"]+' \
              | head -1)
            VERSION=$(echo "$TAG" | sed "$TAG_PATTERN")
          elif [[ "${RELEASE_TYPE}" == "any" ]]; then
            TAG=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${UPSTREAM_REPO}/releases?per_page=1" \
              | grep '"tag_name"' \
              | head -1 \
              | sed 's/.*"tag_name": "\([^"]*\)".*/\1/')
            VERSION=$(echo "$TAG" | sed "$TAG_PATTERN")
          else
            TAG=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest" \
              | grep '"tag_name"' \
              | sed 's/.*"tag_name": "\([^"]*\)".*/\1/')
            VERSION=$(echo "$TAG" | sed "$TAG_PATTERN")
          fi
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: Failed to determine upstream version" >&2
            exit 1
          fi
          if [[ "$VERSION" == "null" ]]; then
            echo "ERROR: No releases found upstream" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get current pkgver
        id: current
        env:
          PACKAGE: ${{ matrix.package.name }}
          PKGVER_VAR: ${{ matrix.package.pkgver_var }}
        run: |
          PKGVER=$(grep "^${PKGVER_VAR}=" "${PACKAGE}/PKGBUILD" | cut -d= -f2-)
          echo "version=$PKGVER" >> "$GITHUB_OUTPUT"

      - name: Dispatch update if new version found
        if: steps.upstream.outputs.version != steps.current.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
          PACKAGE: ${{ matrix.package.name }}
          PKGVER_VAR: ${{ matrix.package.pkgver_var }}
        run: |
          echo "New version for ${PACKAGE}: ${UPSTREAM_VERSION} (current: ${CURRENT_VERSION})"
          gh workflow run update-pkgbuild.yml \
            --field "package=${PACKAGE}" \
            --field "version=${UPSTREAM_VERSION}" \
            --field "pkgver_var=${PKGVER_VAR}"
