name: Check joplin-bin for upstream updates

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest Joplin release version
        id: upstream
        run: |
          VERSION=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/laurent22/joplin/releases/latest \
            | grep '"tag_name"' \
            | sed 's/.*"v\([^"]*\)".*/\1/')
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: Failed to extract upstream version from API response" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get current pkgver
        id: current
        run: |
          PKGVER=$(grep '^pkgver=' joplin-bin/PKGBUILD | cut -d= -f2)
          echo "version=$PKGVER" >> "$GITHUB_OUTPUT"

      - name: Dispatch update workflow if new version found
        if: steps.upstream.outputs.version != steps.current.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
          CURRENT_VERSION: ${{ steps.current.outputs.version }}
        run: |
          echo "New version: ${UPSTREAM_VERSION} (current: ${CURRENT_VERSION})"
          gh workflow run update-pkgbuild.yml --field "version=${UPSTREAM_VERSION}"
