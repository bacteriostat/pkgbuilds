name: Update AUR PKGBUILD

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (e.g. joplin-bin)'
        required: true
        type: string
      version:
        description: 'New version number (e.g. 3.6.12)'
        required: true
        type: string
      pkgver_var:
        description: 'PKGBUILD variable holding the version (default: pkgver)'
        required: false
        default: 'pkgver'
        type: string

concurrency:
  group: update-${{ inputs.package }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Update pkgver and pkgrel
        env:
          PACKAGE: ${{ inputs.package }}
          VERSION: ${{ inputs.version }}
          PKGVER_VAR: ${{ inputs.pkgver_var }}
        run: |
          sed -i "s/^${PKGVER_VAR}=.*/${PKGVER_VAR}=${VERSION}/" "${PACKAGE}/PKGBUILD"
          sed -i "s/^pkgrel=.*/pkgrel=1/" "${PACKAGE}/PKGBUILD"

      - name: Run updpkgsums and regenerate .SRCINFO in Arch container
        env:
          WORKSPACE: ${{ github.workspace }}
          PACKAGE: ${{ inputs.package }}
        run: |
          docker run --rm \
            -v "${WORKSPACE}/${PACKAGE}:/pkg" \
            archlinux:latest \
            bash -c "
              pacman -Syu --noconfirm pacman-contrib base-devel &&
              useradd -m builder &&
              chown -R builder /pkg &&
              su builder -c 'cd /pkg && updpkgsums && makepkg --printsrcinfo > .SRCINFO'
            "
          sudo chown -R "$(id -u):$(id -g)" "${PACKAGE}/"

      - name: Create update branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: ${{ inputs.package }}
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "${{ secrets.AUR_USER_NAME }}"
          git config user.email "${{ secrets.AUR_USER_EMAIL }}"
          BRANCH="update/${PACKAGE}-v${VERSION}"
          git checkout -b "${BRANCH}" 2>/dev/null || git checkout "${BRANCH}"
          git add "${PACKAGE}/PKGBUILD" "${PACKAGE}/.SRCINFO"
          if git diff --cached --quiet; then
            echo "Nothing to commit, skipping"
          else
            git commit -m "${PACKAGE}: update to ${VERSION}"
          fi
          git push origin "${BRANCH}" --force-with-lease
          if gh pr list --head "${BRANCH}" --state open --json number -q '.[0].number' 2>/dev/null | grep -q .; then
            echo "PR for ${BRANCH} already open, skipping creation"
          else
            gh pr create \
              --title "${PACKAGE}: update to ${VERSION}" \
              --body "Automated update to upstream release v${VERSION}." \
              --base master
          fi
