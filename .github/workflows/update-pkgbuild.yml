name: Update joplin-bin PKGBUILD

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version number (e.g. 3.6.12)'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Update pkgver, pkgrel, and switch md5 to sha256
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" joplin-bin/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" joplin-bin/PKGBUILD
          sed -i "s/^md5sums_x86_64=/sha256sums_x86_64=/" joplin-bin/PKGBUILD

      - name: Run updpkgsums and regenerate .SRCINFO in Arch container
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          docker run --rm \
            -v "${WORKSPACE}/joplin-bin:/pkg" \
            archlinux:latest \
            bash -c "
              pacman -Syu --noconfirm pacman-contrib base-devel &&
              useradd -m builder &&
              chown -R builder /pkg &&
              su builder -c 'cd /pkg && updpkgsums && makepkg --printsrcinfo > .SRCINFO'
            "
          sudo chown -R "$(id -u):$(id -g)" joplin-bin/

      - name: Create update branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "bacteriostat"
          git config user.email "dev.bacteriostat@aleeas.com"
          BRANCH="update/joplin-bin-v${VERSION}"
          git checkout -b "${BRANCH}" 2>/dev/null || git checkout "${BRANCH}"
          git add joplin-bin/PKGBUILD joplin-bin/.SRCINFO
          git commit -m "joplin-bin: update to ${VERSION}" || echo "Nothing to commit"
          git push origin "${BRANCH}" --force-with-lease
          if ! gh pr view "${BRANCH}" --json state -q .state 2>/dev/null | grep -q OPEN; then
            gh pr create \
              --title "joplin-bin: update to ${VERSION}" \
              --body "Automated update to upstream release v${VERSION}." \
              --base master
          else
            echo "PR for ${BRANCH} already open, skipping creation"
          fi
